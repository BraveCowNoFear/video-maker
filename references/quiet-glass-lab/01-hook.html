<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="base.css">
  <style>
    html,
    body {
      background: #030504 !important;
    }

    body::before,
    body::after,
    .window::before,
    .window::after {
      display: none;
    }

    .slide {
      padding: 0;
    }

    .window {
      height: 100%;
      border: 0;
      border-radius: 0;
      background:
        radial-gradient(circle at 26% 106%, rgba(208, 248, 16, 0.14), transparent 26%),
        radial-gradient(circle at 72% 108%, rgba(28, 38, 24, 0.34), transparent 30%),
        radial-gradient(circle at 62% 24%, rgba(255, 255, 255, 0.03), transparent 22%),
        linear-gradient(180deg, #060807 0%, #050706 54%, #080b09 100%);
      box-shadow: none;
    }

    .minimal-stage {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 352px;
      grid-template-rows: 1fr;
      gap: 56px;
      height: 100vh;
      min-height: 100vh;
      box-sizing: border-box;
      align-items: stretch;
      padding: 56px 56px 0;
    }

    .hero-block {
      max-width: 940px;
      height: 100%;
      min-height: 0;
      padding: 38px 40px 34px;
      border-radius: 34px;
      background:
        linear-gradient(180deg, rgba(34, 40, 37, 0.46), rgba(12, 15, 13, 0.54)),
        rgba(12, 15, 13, 0.46);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(24px) saturate(118%);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .eyebrow {
      margin-bottom: 18px;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: rgba(208, 248, 16, 0.92);
    }

    .title-xl {
      max-width: 660px;
      font-size: 112px;
      line-height: 0.94;
      letter-spacing: -0.065em;
      text-wrap: balance;
    }

    .lede {
      max-width: 760px;
      margin-top: 24px;
      font-size: 30px;
      line-height: 1.5;
      color: rgba(240, 244, 236, 0.88);
    }

    .token-row {
      display: flex;
      flex-wrap: wrap;
      gap: 26px;
      margin-top: 32px;
      color: rgba(240, 244, 236, 0.88);
      font-size: 24px;
      font-weight: 560;
      letter-spacing: -0.015em;
    }

    .token {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .token::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 18px rgba(208, 248, 16, 0.5);
    }

    .metric-row {
      display: flex;
      gap: 42px;
      margin-top: 34px;
    }

    .metric {
      min-width: 0;
    }

    .metric .value {
      color: var(--accent);
      font-size: 38px;
      line-height: 1;
      letter-spacing: -0.04em;
      font-weight: 650;
    }

    .metric .label {
      margin-top: 10px;
      font-size: 22px;
      line-height: 1.48;
      color: var(--muted);
    }

    .side-notes {
      align-self: start;
      padding-top: 0;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .side-note {
      padding: 0 0 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .side-note strong {
      display: block;
      font-size: 30px;
      line-height: 1.24;
      letter-spacing: -0.03em;
      color: var(--ink);
    }

    .side-note span {
      display: block;
      margin-top: 10px;
      font-size: 23px;
      line-height: 1.58;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="slide">
    <section class="window">
      <div class="minimal-stage">
        <section class="hero-block">
          <div>
            <div class="eyebrow">全流量分级燃烧</div>
            <h1 class="title-xl">__TOPIC__</h1>
            <p class="lede">先把问题摆到台面，再把术语拆开，最后给观众一个能直接落地的判断顺序。</p>
          </div>

          <div>
            <div class="token-row">
              <div class="token">定义</div>
              <div class="token">术语</div>
              <div class="token">取舍</div>
              <div class="token">选择</div>
            </div>

            <div class="metric-row">
              <div class="metric">
                <div class="value">先讲直觉</div>
                <div class="label">不要上来堆黑话，先让观众知道这期视频到底在解决什么困惑。</div>
              </div>
              <div class="metric">
                <div class="value">再拆术语</div>
                <div class="label">把容易混在一起的层次分开，不要在同一句里混着讲。</div>
              </div>
              <div class="metric">
                <div class="value">最后给法</div>
                <div class="label">收束成一条能直接带走的判断方法，而不是只留概念印象。</div>
              </div>
            </div>
          </div>
        </section>

        <aside class="side-notes">
          <div class="side-note">
            <strong>同一个主题，观众到底会困惑什么</strong>
            <span>hook 页不负责讲全，它只负责把这期视频为什么值得看说清楚。</span>
          </div>
          <div class="side-note">
            <strong>这一页要轻，不要假系统 UI</strong>
            <span>不放状态栏，不放假按钮，不堆卡片，只保留一个主视觉中心和两条辅助注释。</span>
          </div>
        </aside>
      </div>
    </section>
  </main>
</body>
</html>
