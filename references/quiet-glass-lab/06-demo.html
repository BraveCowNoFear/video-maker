<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="base.css">
</head>
<body>
  <main class="slide">
    <section class="window">
      <div class="toolbar">
        <div class="toolbar-left">
          <div class="round-btn">◌</div>
          <div class="app-pill">相邻概念</div>
        </div>
        <div class="toolbar-right">
          <div class="app-pill subtle">对照</div>
        </div>
      </div>
      <div class="content">
        <section class="surface">
          <div class="surface-inner">
            <div class="eyebrow">Contrast Page</div>
            <h1 class="title-lg">再看一个最容易被混淆的对照项</h1>
            <p class="caption">这一页默认拿两个“名字像一类、但经常不在同一层比较”的对象做对照，帮观众建立边界感。</p>
            <div class="fp8-grid">
              <div class="fp8-card">
                <div class="compare-kicker">Option A</div>
                <div class="type">方案 A</div>
                <div class="type-note">左边这张卡负责说明它的重点是什么、最常出现在哪个语境里。</div>
              </div>
              <div class="fp8-card">
                <div class="compare-kicker">Option B</div>
                <div class="type">方案 B</div>
                <div class="type-note">右边这张卡负责说明它为什么看起来像同类，但真实使用方式可能完全不同。</div>
              </div>
            </div>
            <div class="callout">
              <strong>模板提醒</strong>
              <span>做对照的目标不是分出胜负，而是告诉观众“为什么这两个东西不能一句话混讲”。</span>
            </div>
          </div>
        </section>
        <div class="foot"><span>默认第六页：对照页，负责把最常被混淆的一对概念拆开</span><span>06</span></div>
      </div>
    </section>
  </main>
</body>
</html>
