<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="base.css">
</head>
<body>
  <main class="slide">
    <section class="window">
      <div class="toolbar">
        <div class="toolbar-left">
          <div class="round-btn">◦</div>
          <div class="app-pill">核心概念</div>
        </div>
        <div class="toolbar-right">
          <div class="app-pill subtle">定义</div>
        </div>
      </div>
      <div class="content split-layout">
        <section class="surface">
          <div class="surface-inner">
            <div class="eyebrow">Core idea</div>
            <h1 class="title-lg">它到底是什么</h1>
            <p class="lede">先讲定义，不先堆术语。把 __TOPIC__ 放回它真正所在的那一层问题里。</p>
            <p class="caption">这一页默认承担“建立直觉”的任务，让观众先知道它在解决什么，而不是被名词先吓住。</p>
            <div class="formula mono">一句话模板：它不是 ____，而是 ____。</div>
          </div>
        </section>
        <aside class="glass-panel stack-card">
          <div class="stack-note">
            <strong>直觉版</strong>
            <span>先找一个观众熟悉的比喻，把抽象概念翻译成能听懂的话。</span>
          </div>
          <div class="bit-stack">
            <div class="bit-row">
              <div class="bit-head"><span>定义</span><span>先说它是什么</span></div>
              <div class="bit-track"><div class="bit-fill w16"></div></div>
            </div>
            <div class="bit-row">
              <div class="bit-head"><span>边界</span><span>再说它不是什么</span></div>
              <div class="bit-track"><div class="bit-fill w8"></div></div>
            </div>
            <div class="bit-row">
              <div class="bit-head"><span>位置</span><span>最后说它落在哪一层</span></div>
              <div class="bit-track"><div class="bit-fill w4"></div></div>
            </div>
          </div>
          <div class="stack-note">
            <strong>关键提醒</strong>
            <span>概念页的任务不是讲完细节，而是先搭一个后面几页都能复用的认知框架。</span>
          </div>
        </aside>
        <div class="foot"><span>默认第二页：定义页，负责建立直觉</span><span>02</span></div>
      </div>
    </section>
  </main>
</body>
</html>
