<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="base.css">
</head>
<body>
  <main class="slide">
    <section class="window">
      <div class="toolbar">
        <div class="toolbar-left">
          <div class="round-btn">◌</div>
          <div class="app-pill">为什么值得讲</div>
        </div>
        <div class="toolbar-right">
          <div class="app-pill subtle">资源</div>
        </div>
      </div>
      <div class="content metric-layout">
        <section class="surface">
          <div class="surface-inner">
            <div class="eyebrow">Why people care</div>
            <h1 class="title-lg">它为什么值得讲</h1>
            <p class="caption">这一页默认用三张卡片，把收益、约束和真正代价摆清楚，不做泛泛而谈。</p>
          </div>
        </section>
        <div class="stat-grid">
          <div class="stat-card">
            <div class="kicker">Constraint</div>
            <div class="stat-value">卡在哪</div>
            <div class="stat-note">先讲观众最能感受到的限制，是资源、流程、成本，还是时间。</div>
          </div>
          <div class="stat-card">
            <div class="kicker">Payoff</div>
            <div class="stat-value">换来什么</div>
            <div class="stat-note">再讲它真正带来的好处，不要一上来就把结果吹成银弹。</div>
          </div>
          <div class="stat-card">
            <div class="kicker">Cost</div>
            <div class="stat-value">代价在哪</div>
            <div class="stat-note">最后把缺点明说，告诉观众它不是“白拿到一切”。</div>
          </div>
        </div>
        <div class="foot"><span>默认第三页：收益页，负责讲“为什么现在要关心它”</span><span>03</span></div>
      </div>
    </section>
  </main>
</body>
</html>
